spring:
  application:
    name: workout-api

  # Local Supabase stack defaults (`supabase start`):
  #   DB on 54322, API/JWKS on 54321, creds postgres/postgres, db `postgres`.
  # Override per-environment with SPRING_DATASOURCE_* env vars.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null

  # Auth: verify Supabase ES256 JWTs locally against the JWKS endpoint (no auth-server round trip).
  # JWKS/issuer differ per environment — override via env (or the prod profile, when added).
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI:http://127.0.0.1:54321/auth/v1/.well-known/jwks.json}
          # Supabase signs with ES256; a jwk-set-uri decoder defaults to RS256, so be explicit.
          jws-algorithms: ${SUPABASE_JWT_ALG:ES256}
          audiences: ${SUPABASE_JWT_AUDIENCE:authenticated}

management:
  endpoints:
    web:
      exposure:
        include: health,info
